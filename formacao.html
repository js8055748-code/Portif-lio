<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Formação - Juarez Silva</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- NAVIGAÇÃO COM FAN SPEED KNOB -->
  <nav class="nav-knob">
    <div class="fan-speed-knob">
      <div class="wrapper">
        <div class="knob-outer">
          <div class="knob-base">
            <hr class="divider" />
            <hr class="divider" />
            <hr class="divider" />
            <div class="control">
              <label for="fan_off"><span class="off"><a href="portifolio.html">OFF</a></span></label>
              <label for="fan_1"><span><a href="sobre.html">Sobre</a></span></label>
              <label for="fan_2"><span><a href="projetos.html">Projetos</a></span></label>
              <label for="fan_3"><span><a href="habilidades.html">Habilidades</a></span></label>
       
              <label for="fan_5"><span><a href="contato.html">Contato</a></span></label>

              <input id="fan_off" name="fan" checked type="radio" />
              <input id="fan_1" name="fan" type="radio" />
              <input id="fan_2" name="fan" type="radio" />
              <input id="fan_3" name="fan" type="radio" />
              <input id="fan_4" name="fan" type="radio" />
              <input id="fan_5" name="fan" type="radio" />

              <div class="pointer"><span></span></div>
              <div class="marker"><span></span></div>

              <div class="knob-middle">
                <div class="knob-inner">
                  <div class="knob-core">
                    <div class="status">
                      <div class="off-light"></div>
                      <div class="speed-lights">
                        <span class="speed-light"></span>
                        <span class="speed-light"></span>
                        <span class="speed-light"></span>
                        <span class="speed-light"></span>
                        <span class="speed-light"></span>
                      </div>
                    </div>
                  </div>
                </div>
              </div><!-- knob-middle -->
            </div><!-- control -->
          </div><!-- knob-base -->
        </div><!-- knob-outer -->
      </div><!-- wrapper -->
    </div><!-- fan-speed-knob -->
  </nav>

  <!-- CARDS DE FORMAÇÃO LADO A LADO -->
  <main class="formacao-cards">
    <!-- CARD 1 -->
    <!-- From Uiverse.io by Smit-Prajapati -->
    <div class="card">
      <div class="top-section">
        <div class="border"></div>
        <div class="icons">
          <div class="logo">
            <img src="img/pitagoras.webp" alt="Ícone formação" class="svg">
          </div>
          <div class="title">
            <h2>Sistemas de Informação</h2>
            <p>Universidade Pitágoras</p>
            <p>Conclusão: 2025</p>
          </div>
        </div>
      </div>
    </div>

    <!-- CARD 2 -->
    <div class="card">
      <div class="top-section">
        <div class="border"></div>
        <div class="icons">
          <div class="logo">
            <img src="img/tecnico.jpg" alt="Ícone formação" class="svg">
          </div>
          <div class="title">
            <h2>Técnico em Enfermagem</h2>
            <p>Instituição de ensino CECON</p>
            <p>Conclusão: 2014</p>
          </div>
        </div>
      </div>
    </div>

    <!-- CARD 3 -->
    <div class="card">
      <div class="top-section">
        <div class="border"></div>
        <div class="icons">
          <div class="logo">
            <img src="img/cod.jpg" alt="Ícone formação" class="svg">
          </div>
          <div class="title">
            <h2>Téc. Desenvolvimento de Software</h2>
            <p>Instituição de ensino Proz</p>
            <p>Conclusão: 2026</p>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
